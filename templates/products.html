{% extends "base.html" %}
{% block title %}Produtos{% endblock %}
{% block content %}
<h1 class="section-title" style="font-size:1.5rem;">Departamentos</h1>
<form class="filters" method="get" action="{{ url_for('store.products') }}">
  <input type="search" name="q" placeholder="Busca" value="{{ q }}">
  <select name="categoria" aria-label="Categoria">
    <option value="">Todas as categorias</option>
    {% for c in categories %}
    <option value="{{ c }}" {% if cat == c %}selected{% endif %}>{{ c }}</option>
    {% endfor %}
  </select>
  <button type="submit" class="btn btn-primary">Filtrar</button>
</form>
<div class="grid">
  {% for p in items %}
  <article class="card">
    <div class="card-img" aria-hidden="true">📦</div>
    <div class="card-body">
      <h2 class="card-title"><a href="{{ url_for('store.product_detail', slug=p.slug) }}">{{ p.name }}</a></h2>
      <p style="font-size:0.85rem;color:var(--muted);margin:0;">{{ p.category }}</p>
      <div class="price">{{ p.price_brl() }}</div>
      <form action="{{ url_for('store.add_to_cart', product_id=p.id) }}" method="post">
        <input type="hidden" name="qty" value="1">
        <button type="submit" class="btn btn-primary btn-cart">Adicionar ao carrinho</button>
      </form>
    </div>
  </article>
  {% else %}
  <p>Nenhum produto encontrado.</p>
  {% endfor %}
</div>
{% endblock %}
