# Blueprint Render: https://dashboard.render.com/select-repo?type=blueprint
# Após o deploy, o site fica em https://<nome-do-serviço>.onrender.com
services:
  - type: web
    name: projeto-ecommerce-jca
    runtime: python
    plan: free
    # Deploy automático a cada commit na branch ligada ao serviço (GitHub/GitLab).
    autoDeployTrigger: commit
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 1
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.4"
      - key: SECRET_KEY
        generateValue: true
