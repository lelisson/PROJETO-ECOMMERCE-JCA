# Deploy automático na Vercel a cada push na branch main.
# Configure em GitHub: Settings → Secrets and variables → Actions → New repository secret:
#   VERCEL_TOKEN  → https://vercel.com/account/tokens (Create Token)
#
# IDs do projeto (painel Vercel → jca-plasticos → Settings → General) ou pasta jca-plasticos/.vercel/project.json
name: Deploy Vercel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jca-plasticos

    env:
      VERCEL_ORG_ID: team_u2aX78uhRrZ8Xr04RNOcEUAc
      VERCEL_PROJECT_ID: prj_2Wk7dLA3kHsR4sxLBEsZO25ImeFI

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: jca-plasticos/package-lock.json

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel env (production)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
